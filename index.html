<script>
let destinoMover = null;
let selecionadosMover = new Set();
let modoEditarObras = false;
let obraArrastando = null;
let historico = [];
let ultimoSnapshot = null;
const firebaseConfig = {
  apiKey: "AIzaSyDom32F_eZw0mTSsb1U0UHqlJXH8TcslGA",
  authDomain: "painel-frota-5c761.firebaseapp.com",
  databaseURL: "https://painel-frota-5c761-default-rtdb.firebaseio.com",
  projectId: "painel-frota-5c761",
  storageBucket: "painel-frota-5c761.firebasestorage.app",
  messagingSenderId: "442336919597",
  appId: "1:442336919597:web:825f508c16a989bf37f8a4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let modo = "visitante";
	function apenasAdmin(){
    if(modo !== "admin"){
        alert("Apenas administradores podem alterar o sistema.");
        return false;
    }
    return true;
}
	let motoristas = [];
	let obras = [];
	let agendaMunk = {};
	let colunasAbertas = { 
    "OFICINA": false, 
    "SEM PROGRAMAÇÃO": true,
    "PEDREIRA": true
};

const el = id => document.getElementById(id);

function mostrarSenha(){ el("senhaBox").style.display="block"; el("escolha").style.display="none"; }
function voltar(){ el("senhaBox").style.display="none"; el("escolha").style.display="block"; }
function entrarAdmin(){ if(el("senha").value==="AdminBal"){ modo="admin"; iniciar(); } else alert("Senha incorreta"); }
function entrarVisitante(){ modo="visitante"; iniciar(); }

function iniciar(){
	atualizarRelogio();
    el("login").style.display="none";
    el("app").style.display="block";
    el("badge-modo").innerText="MODO: "+modo.toUpperCase();
    if(modo!=="admin"){
    ["btnMotoristas","btnObras","btnWhats"].forEach(id=>{
        const b = el(id);
        if(b) b.style.display="none";
    });

    el("pipa-txt").readOnly = true;
}
    carregarRealtime();
    buscarClima();
	setInterval(snapshotDiario, 60000);
}


async function buscarClima(){
    const climaEl = el("clima");
    try{
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-27.09&longitude=-48.91&current_weather=true");
        const data = await res.json();
        const temp = Math.round(data.current_weather.temperature);
        const code = data.current_weather.weathercode;
        let status="Céu Limpo"; let icone="☀️";
        if(code>=1&&code<=3){status="Nublado";icone="☁️"}
        else if(code>=45&&code<=48){status="Neblina";icone="🌫️"}
        else if((code>=51&&code<=67)||(code>=80&&code<=82)){status="Chovendo";icone="🌧️"}
        else if(code>=95){status="Trovoadas";icone="⛈️"}
        climaEl.innerHTML=`${icone} ${temp}°C - ${status.toUpperCase()}`;
    }catch(e){ climaEl.innerText="--°C"; }
}

function salvar(){
    if(modo!=="admin") return;

    db.ref("frotaGlobal").set({
        motoristas: motoristas,
        obras: obras,
        agendaMunk: agendaMunk,
        fluxoPipa: el("pipa-txt").value,
        historico: historico
    });

}

function carregarRealtime(){

    db.ref("frotaGlobal").on("value", (snapshot) => {

        const dados = snapshot.val();

        if(dados){

            motoristas = dados.motoristas || [];
			motoristas.forEach(m=>{
if(!m.card) m.card="INTERNO";
if(!m.tipo) m.tipo="";
});
            obras = dados.obras || [];
			obras.forEach(o=>{

if(!o.tipos){
if(o.tipo){
o.tipos=[o.tipo];
}else{
o.tipos=["interna"];
}
}

});
            agendaMunk = dados.agendaMunk || {};
            historico = dados.historico || [];
            el("pipa-txt").value = dados.fluxoPipa || "";

            obras.forEach((o,i)=>{

                if(o.ordem === undefined){
                    o.ordem = i;
                }

            });

        }

        render(); // 🔵 importante para atualizar o painel

    });

}
function abrirMoverMotoristas(obra){

destinoMover = obra;
selecionadosMover.clear();

el("modalMoverMotoristas").style.display = "flex";

el("buscaMoverMotorista").value = "";

renderMoverMotoristas();

}
function toggleSelecionado(i){

if(selecionadosMover.has(i)){
selecionadosMover.delete(i);
}else{
selecionadosMover.add(i);
}

}
function confirmarMoverMotoristas(){

if(selecionadosMover.size === 0){
alert("Selecione ao menos um motorista.");
return;
}

selecionadosMover.forEach(i=>{

const m = motoristas[i];
const origem = m.obra || "SEM PROGRAMAÇÃO";

m.status="ativo";
m.obsOficina="";

if(destinoMover==="SEM PROGRAMAÇÃO"){
    m.obra="SEM PROGRAMAÇÃO";
    m.card="INTERNO";
}
else if(destinoMover==="PEDREIRA"){
    m.obra="PEDREIRA";
    m.card="INTERNO";
}
else{

    const partes = destinoMover.split("_");

    m.obra = partes[0];

    if(partes[1] === "VINCULO"){
        m.card = "VINCULO_" + partes[2];
    }else{
        m.card = partes[1] || "INTERNO";
    }

}

registrarHistorico(m, origem, m.obra);

});

salvar();
render();
fecharModal();

}	
function renderMoverMotoristas(){

const busca = (el("buscaMoverMotorista").value || "").toLowerCase();
const lista = el("listaMoverMotoristas");

lista.innerHTML = "";

motoristas
.filter(m =>
(m.nome || "").toLowerCase().includes(busca) ||
(m.placa || "").toLowerCase().includes(busca)
)
.forEach((m)=>{

const i = motoristas.indexOf(m);
const marcado = selecionadosMover.has(i);

const div = document.createElement("div");
div.className="itemLista";

div.innerHTML = `
<label style="display:flex;align-items:center;gap:12px;cursor:pointer">
<input type="checkbox" ${marcado?"checked":""} onclick="toggleSelecionado(${i})">
<div style="line-height:1.3">
<strong>${m.nome}</strong><br>
<small>${m.placa}</small><br>
<small style="color:#777">${m.obra || "SEM PROGRAMAÇÃO"}</small>
</div>
</label>
`;

lista.appendChild(div);

});

}
function finalizarEdicaoObras(){

    modoEditarObras = false;

    el("btnEditarObras").style.display = "inline-block";
    el("btnSalvarOrdem").style.display = "none";

    salvar();
    render();

}
function ativarEdicaoObras(){

    modoEditarObras = true;

    colunasAbertas = {}; // fecha todas

    el("btnEditarObras").style.display = "none";
    el("btnSalvarOrdem").style.display = "inline-block";

function contarTipos(lista){

    let trucks = 0;
    let bitrucks = 0;
    let carretas = 0;

    lista.forEach(m=>{

        if(m.tipo==="TRUCK") trucks++;
        if(m.tipo==="BITRUCK") bitrucks++;
        if(m.tipo==="CARRETA") carretas++;

    });

    return {trucks,bitrucks,carretas};

}

function soltar(e,destino){
	if(modo !== "admin") return;
	if(modoEditarObras) return;

    e.preventDefault();   // 🔴 ESSENCIAL

	const index = Number(e.dataTransfer.getData("text/plain"));
if(isNaN(index)) return;
    const m = motoristas[index];

    if(!m) return;

    const origem = m.obra || "SEM PROGRAMAÇÃO";

    if(destino==="OFICINA"){

        const mot = prompt("Motivo manutenção:",m.obsOficina||"");

        if(mot!==null){
            m.status="oficina";
            m.obsOficina=mot;
            m.obra=null;

            registrarHistorico(m, origem, "OFICINA");
        }

    }else{

        m.status="ativo";
        m.obsOficina="";

        if(destino==="SEM PROGRAMAÇÃO"){
    m.obra="SEM PROGRAMAÇÃO";
    m.card="INTERNO";
}
else if(destino==="PEDREIRA"){
    m.obra="PEDREIRA";
    m.card="INTERNO";
}
else{
    const partes = destino.split("_");

    m.obra = partes[0];

    if(partes[1] === "VINCULO"){
        m.card = "VINCULO_" + partes[2];
    }else{
        m.card = partes[1] || "INTERNO";
    }
}

registrarHistorico(m, origem, m.obra + " (" + (m.card||"INTERNO") + ")");
    }

    salvar();
    render();
}

if(!apenasAdmin()) return;

}

if(idx !== i){

});

}

salvar();
render();
abrirObras();

    }

    if(d){

        const dataBR = new Date(d).toLocaleDateString("pt-BR");

        lista = lista.filter(h =>
            h.data.includes(dataBR)
        );

    }

    renderHistorico(lista);

}
		function limparFiltro(){

    el("filtroMotorista").value="";
    el("filtroObra").value="";
    el("filtroData").value="";

    renderHistorico(historico);

}
		function renderHistorico(lista){

    const div = el("listaHistorico");

    div.innerHTML="";

    if(lista.length===0){

        div.innerHTML="<p>Nenhum registro</p>";

        return;

    }

    lista.forEach(h=>{

        const item=document.createElement("div");

        item.className="itemLista";

        item.innerHTML=`
        <div>
        <strong>${h.motorista}</strong><br>
        <small>${h.de} → ${h.para}</small>
        </div>

        <div>${h.data}</div>
        `;

        div.appendChild(item);

    });

}
	function editarLocalizacao(i){

    const lat = prompt("Latitude da obra:", obras[i].lat || "");
    const lng = prompt("Longitude da obra:", obras[i].lng || "");

    if(lat && lng){

        obras[i].lat = lat;
        obras[i].lng = lng;

        salvar();
        abrirObras();

    }

}
function editarTipoObra(i){

if(!apenasAdmin()) return;

const escolha = prompt(
"Tipo da obra:\n\n1 - OBRA INTERNA\n2 - ENTREGA DE MATERIAL"
);

if(!escolha) return;

const tipo = escolha === "2" ? "entrega" : "interna";

if(!obras[i].tipos) obras[i].tipos=[];

const pos = obras[i].tipos.indexOf(tipo);

if(pos !== -1){

// remove
obras[i].tipos.splice(pos,1);

}else{

// adiciona
obras[i].tipos.push(tipo);

}

salvar();
render();
abrirObras();

}
function toggleMenu() {

const menu = document.getElementById("menuLateral");
const overlay = document.getElementById("overlay-fundo");

menu.classList.toggle("aberto");

if(menu.classList.contains("aberto")){
    overlay.style.display = "block";
}else{
    overlay.style.display = "none";
}

}
function atualizarRelogio(){

const agora = new Date();

el("horaAgora").innerText =
agora.toLocaleTimeString("pt-BR");

el("dataHoje").innerText =
agora.toLocaleDateString("pt-BR",{
weekday:"long",
day:"2-digit",
month:"long"
}).toUpperCase();

}

setInterval(atualizarRelogio,1000);	
function fecharModal(){ document.querySelectorAll(".modal").forEach(m=>m.style.display="none"); }
document.addEventListener("DOMContentLoaded",()=>{
    el("pipa-txt").onchange = salvar;
});
